x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pmm}:${POSTGRES_PASSWORD:-pmm}@db:5432/${POSTGRES_DB:-pmm}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the selected env file}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
  ENABLE_SECURITY_HEADERS: ${ENABLE_SECURITY_HEADERS:-true}
  SQL_ECHO: ${SQL_ECHO:-false}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
  DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
  DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
  DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-10}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
  PRINT_QR_TARGET_URL: ${PRINT_QR_TARGET_URL:-http://localhost:3000}
  FIRST_ADMIN_LOGIN: ${FIRST_ADMIN_LOGIN:-}
  FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-}
  FIRST_ADMIN_FULL_NAME: ${FIRST_ADMIN_FULL_NAME:-First Administrator}
  ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/var/lib/pmm/artifacts}
  BACKUP_DIR: ${BACKUP_DIR:-/var/lib/pmm/backups}
  BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-10}
  POSTING_ERROR_LOG_PATH: ${POSTING_ERROR_LOG_PATH:-/var/log/pmm/posting_errors.log}
  BACKEND_VERSION: ${BACKEND_VERSION:-dev}
  FRONTEND_VERSION: ${FRONTEND_VERSION:-dev}
  ENABLE_LEGACY_JSON_RESTORE: ${ENABLE_LEGACY_JSON_RESTORE:-false}

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmm}
      POSTGRES_DB: ${POSTGRES_DB:-pmm}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmm} -d ${POSTGRES_DB:-pmm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_artifacts:/var/lib/pmm/artifacts
      - backend_backups:/var/lib/pmm/backups
      - backend_logs:/var/log/pmm
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-ready.sh"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - app

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    profiles: ["ops"]
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

networks:
  app:

volumes:
  db_data:
  backend_artifacts:
  backend_backups:
  backend_logs:
  frontend_node_modules:
